id: E2
name: Household Finances — Selected Ratios (Quarterly)
description: |
  Quarterly household leverage ratios: debt-to-income, debt-to-assets,
  assets-to-income, housing-only variants. These are the canonical
  Australian household-finance ratios cited by every macro analyst,
  bank strategist, super fund chief economist, RBA / AFR / Treasury
  journalist tracking household leverage cycles.

  Headline series are household debt-to-income (total and housing-only,
  with a seasonally-adjusted owner-occupier variant), household debt-to-
  assets, and assets-to-income (total, housing-only, financial-only).
  Together they describe both the liability side (how much households
  owe) and the asset side (what they own) of the household balance
  sheet, expressed relative to disposable income. Call `latest('E2')`
  for current values.

  Source: RBA Statistical Table E2. Series back to 1988. Use this for
  "how leveraged are AU households right now?", "where are we in the
  household-debt cycle?", "what happens to debt-to-income when rates
  rise?". Completes the macro workflow alongside F1.1 (cash rate),
  D1/D2 (credit aggregates), G3 (inflation expectations), C1
  (card spending), and apra-mcp ADI_PERFORMANCE (bank P&L).
update_frequency: quarterly
csv_filename: e2-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
# Default returned when caller omits `series`. Total household debt-to-income
# is the canonical leverage ratio cited in macro commentary.
headline_series: household_debt_to_income
search_keywords:
  - household debt
  - debt to income
  - household leverage
  - mortgage debt
  - household balance sheet
  - household debt ratio
  - housing debt to income
  - owner occupier debt
  - household assets to income
  - household debt to assets
  - debt servicing
  - rba e2
series:
  household_debt_to_income:
    series_id: BHFDDIT
    description: Total household debt as % of disposable income — the canonical leverage ratio
    unit: Per cent
  housing_debt_to_income:
    series_id: BHFDDIH
    description: Total housing-related household debt as % of disposable income
    unit: Per cent
  owner_occupier_debt_to_income:
    series_id: BHFDDIO
    description: Owner-occupier housing debt as % of disposable income, seasonally adjusted
    unit: Per cent
  household_debt_to_assets:
    series_id: BHFDA
    description: Total household debt as % of total household assets
    unit: Per cent
  housing_debt_to_housing_assets:
    series_id: BHFHDHA
    description: Housing-related debt as % of housing-related assets (LVR-equivalent for the sector)
    unit: Per cent
  household_assets_to_income:
    series_id: BHFADIT
    description: Total household assets (housing + financial) as % of disposable income
    unit: Per cent
  housing_assets_to_income:
    series_id: BHFHDI
    description: Housing assets only as % of disposable income
    unit: Per cent
  financial_assets_to_income:
    series_id: BHFADIFA
    description: Household financial assets only (deposits, super, equities) as % of disposable income
    unit: Per cent

id: F5
name: Indicator Lending Rates
description: |
  Monthly indicator (advertised) lending rates across housing, small business,
  personal loans, and credit cards. These are the published standard and
  discounted rates set by banks — the reference rates for the market — as
  distinct from actual charged rates (see F6 for actual housing rates and F7/F8
  for actual business/personal rates).

  Covers: owner-occupier and investor housing variable/fixed rates, small
  business variable/fixed, large business weighted average, personal credit
  cards, and personal term loans.
  Source: Reserve Bank of Australia, Statistical Table F5.
update_frequency: monthly
csv_filename: f5-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
search_keywords:
  - indicator lending rate
  - advertised rate
  - standard variable rate
  - housing indicator rate
  - small business rate
  - credit card rate
  - personal loan rate
  - fixed rate home loan
  - indicator mortgage rate
  - published lending rate

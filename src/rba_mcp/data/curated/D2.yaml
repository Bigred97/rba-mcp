id: D2
name: Lending and Credit Aggregates — Monthly
description: |
  Monthly outstanding stock ($ billions) of private-sector lending and credit
  by category: total credit (excluding financial businesses is the current
  RBA headline), housing credit (owner-occupier and investor), business
  credit (non-financial business is the current headline), personal credit,
  plus loans and advances by intermediary type and bills on issue. Where D1
  reports growth rates, D2 reports the underlying levels — the absolute
  dollar stock that grew. Source: RBA Statistical Table D2.

  Note: RBA redefined the credit aggregates in 2019. Series suffixed FB
  ("excluding financial businesses") and NFB ("non-financial business") are
  the current headline definitions; the legacy "total credit" and "business
  credit" series were discontinued.
update_frequency: monthly
csv_filename: d2-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
search_keywords:
  - credit aggregates
  - lending aggregates
  - total credit
  - housing credit levels
  - business credit levels
  - mortgage stock
  - owner occupier housing levels
  - investor housing levels
  - personal credit
  - bank loans and advances
  - non financial business credit
  - bills on issue
  - private sector credit levels
  - rba d2

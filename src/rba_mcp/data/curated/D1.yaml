id: D1
name: Growth in Selected Financial Aggregates — Monthly
description: |
  Monthly growth in private-sector credit and money aggregates: total credit,
  housing credit (split owner-occupier / investor), business credit (non-
  financial business is the current RBA headline definition), personal credit,
  M3 and broad money. Each series is reported as both monthly and 12-month-
  ended growth rates (per cent). Series are seasonally adjusted and include
  securitisations. Source: RBA Statistical Table D1 — the most-cited macro
  statistic after CPI for property and bank-credit commentary.

  Note: RBA redefined "business credit" in 2019. The current headline series
  is non-financial business credit (DGFACBNF*). The legacy "business" series
  (DGFACB*) was discontinued.
update_frequency: monthly
csv_filename: d1-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
search_keywords:
  - credit growth
  - credit aggregates
  - housing credit growth
  - business credit growth
  - personal credit
  - investor housing credit
  - owner occupier housing credit
  - mortgage credit growth
  - private sector credit
  - broad money
  - m3
  - money supply
  - financial aggregates
  - rba d1

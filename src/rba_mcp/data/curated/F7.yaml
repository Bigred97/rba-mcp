id: F7
name: Business Lending Rates
description: |
  Monthly weighted average rates on outstanding and new business loans,
  broken down by business size (small, medium, large) and loan type
  (fixed/variable). These are actual rates charged across all loan facilities
  of each type — as distinct from the advertised indicator rates in F5.

  Small business = <$2m; medium business = $2m–$500m; large business = >$500m.
  Source: Reserve Bank of Australia, Statistical Table F7.
update_frequency: monthly
csv_filename: f7-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
# Default returned when caller omits `series`. Small-business outstanding
# total is the most-cited single number — SME lending stress is the canonical
# business-credit story.
headline_series: outstanding_small_business_total
search_keywords:
  - business lending rate
  - business loan rate
  - sme lending
  - commercial lending
  - small business interest rate
  - medium business loan
  - large business loan
  - outstanding business rate
  - new business loan rate
  - actual business rate
series:
  outstanding_small_business_total:
    series_id: FLRBFOSBT
    description: Outstanding small business loans — total (weighted average)
    unit: Per cent per annum
  outstanding_small_business_fixed:

id: F1.1
name: Money Market — Monthly
description: |
  Monthly money-market rates including the RBA Cash Rate Target (the headline
  policy rate), interbank cash rate, bank-accepted bills, OIS rates, and
  Treasury notes. Source: Reserve Bank of Australia, Statistical Table F1.1.

  **For the CURRENT cash rate use F1 (daily) — not F1.1.** F1.1 publishes
  month-end values only, so it can lag the live cash rate by up to a
  month after an RBA Board rate change (e.g. F1.1's 2026-04-30 row
  shows 4.10% even though the rate moved to 4.35% on 2026-05-06).
update_frequency: monthly
csv_filename: f1.1-data.csv
source_url: https://www.rba.gov.au/statistics/tables/
# Default returned when caller omits `series`. F1.1 carries 11 distinct
# series — cash rate target, interbank, bank bills, OIS, Treasury notes —
# and returning them all mixed together looked like duplicated/garbage data.
# The cash rate target is the headline monetary-policy rate; defaulting to
# it matches the most common ask. Callers wanting all series should pass
# series=list(...) explicitly.
headline_series: cash_rate_target
search_keywords:
  - cash rate
  - cash rate target
  - rba rate
  - monetary policy
  - interest rates
  - money market
  - ocr
  - bank bills
  - ois
  - treasury notes
series:
  cash_rate_target:
    series_id: FIRMMCRT
    description: RBA Cash Rate Target — the headline monetary-policy rate
    unit: Per cent per annum
  cash_rate:
    series_id: FIRMMCRI
    description: Interbank Overnight Cash Rate (actual realised)
    unit: Per cent per annum
  bank_bill_30d:
    series_id: FIRMMBAB30
    description: 1-month Bank-Accepted Bill / NCD yield
    unit: Per cent per annum
  bank_bill_90d:
    series_id: FIRMMBAB90
    description: 3-month Bank-Accepted Bill / NCD yield
    unit: Per cent per annum
  bank_bill_180d:
    series_id: FIRMMBAB180
    description: 6-month Bank-Accepted Bill / NCD yield
    unit: Per cent per annum
  ois_30d:
    series_id: FIRMMOIS1
    description: 1-month Overnight Index Swap rate
    unit: Per cent per annum
  ois_90d:
    series_id: FIRMMOIS3
    description: 3-month Overnight Index Swap rate
    unit: Per cent per annum
  ois_180d:
    series_id: FIRMMOIS6
    description: 6-month Overnight Index Swap rate
    unit: Per cent per annum
  treasury_note_30d:
    series_id: FIRMMTN1
    description: 1-month Treasury Note yield
    unit: Per cent per annum
  treasury_note_90d:
    series_id: FIRMMTN3
    description: 3-month Treasury Note yield
    unit: Per cent per annum
  treasury_note_180d:
    series_id: FIRMMTN6
    description: 6-month Treasury Note yield
    unit: Per cent per annum
